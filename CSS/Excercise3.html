<!DOCTYPE html>
<html>
<head>
    <title>Selectors Playground</title>

    <style>
        /* Universal Selector */
        * {
            margin: 0;
            padding: 0;
        }

        /* Element Selector */
        h2 {
            color: blue;
        }

        /* ID Selector */
        #mainHeader {
            background-color: navy;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* Class Selector */
        .eventCard {
            border: 1px solid black;
            margin: 10px;
            padding: 10px;
        }

        /* Grouping Selector */
        h3, p {
            color: green;
        }
    </style>
</head>
<body>

    <h1 id="mainHeader">Community Event Portal</h1>

    <h2>Upcoming Events</h2>

    <div class="eventCard">
        <h3>Music Festival</h3>
        <p>Enjoy music and entertainment.</p>
    </div>

    <div class="eventCard">
        <h3>Food Fair</h3>
        <p>Taste delicious food from local vendors.</p>
    </div>

</body>
</html>
