<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }

        .highlight {
            background-color: yellow;
            color: black;
            font-weight: bold;
            padding: 2px 5px;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        <h1>Welcome, User!</h1>
        <p>We are glad to have you here.</p>

        <p>
            Don't miss our
            <span style="color: red; font-weight: bold;">
                Special Offer!
            </span>
        </p>
    </div>

    <h2 class="highlight">Latest Updates</h2>

    <p>
        Check out our
        <span class="highlight">new features</span>
        and announcements.
    </p>

</body>
</html>
