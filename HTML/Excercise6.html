<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Feedback</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            width: 500px;
            margin: auto;
        }

        input, select, textarea, button {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }

        img {
            width: 200px;
            height: 150px;
            border: 2px solid black;
            cursor: pointer;
            transition: 0.3s;
        }

        #message {
            color: green;
            font-weight: bold;
        }

        #phoneError {
            color: red;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2>Event Feedback Form</h2>

        <!-- Phone Number -->
        <label>Phone Number:</label>
        <input type="text" id="phone" onblur="validatePhone()">
        <p id="phoneError"></p>

        <!-- Event Selection -->
        <label>Select Event:</label>
        <select id="eventType" onchange="showFee()">
            <option value="">Choose Event</option>
            <option value="100">Workshop</option>
            <option value="200">Seminar</option>
            <option value="300">Cultural Event</option>
            <option value="400">Sports Event</option>
        </select>

        <p id="fee"></p>

        <!-- Feedback -->
        <label>Feedback:</label>
        <textarea id="feedback"
                  rows="5"
                  onkeyup="countCharacters()"></textarea>

        <p>Character Count: <span id="count">0</span></p>

        <!-- Image -->
        <h3>Double Click Image to Enlarge</h3>

        <img src="https://via.placeholder.com/200x150"
             alt="Event Image"
             ondblclick="enlargeImage(this)">

        <br><br>

        <!-- Submit Button -->
        <button onclick="submitForm()">Submit Feedback</button>

        <p id="message"></p>

    </div>

    <script>

        // onblur
        function validatePhone() {
            let phone = document.getElementById("phone").value;

            if (phone.length !== 10 || isNaN(phone)) {
                document.getElementById("phoneError").innerHTML =
                    "Enter a valid 10-digit phone number";
            } else {
                document.getElementById("phoneError").innerHTML = "";
            }
        }

        // onchange
        function showFee() {
            let fee = document.getElementById("eventType").value;

            document.getElementById("fee").innerHTML =
                "Event Fee: ₹" + fee;
        }

        // onclick
        function submitForm() {
            document.getElementById("message").innerHTML =
                "Feedback Submitted Successfully!";
        }

        // ondblclick
        function enlargeImage(img) {
            img.style.width = "400px";
            img.style.height = "300px";
        }

        // Keyboard Event
        function countCharacters() {
            let text =
                document.getElementById("feedback").value;

            document.getElementById("count").innerHTML =
                text.length;
        }

    </script>

</body>
</html>
