<!DOCTYPE html>
<html>
<head>
    <title>Typography: Fonts and Text</title>

    <!-- Google Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap">

    <style>
        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 700;
            text-align: center;
        }

        h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-style: italic;
            font-weight: 400;
        }

        p {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 300;
            text-align: justify;
            text-transform: capitalize;
            letter-spacing: 2px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <h1>Community Event Portal</h1>

    <h2>Upcoming Events</h2>

    <p>
        welcome to our community event portal where you can find information about local events and activities.
    </p>

</body>
</html>
