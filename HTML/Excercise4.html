<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Events Gallery</title>

    <style>
        .event-image {
            width: 200px;
            height: 150px;
            border: 3px solid black;
            padding: 5px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <table border="1">
        <caption>Community Events Gallery</caption>

        <tr>
            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Tree Plantation Event"
                     title="Tree Plantation"
                     class="event-image">
                <p>Tree Plantation Drive</p>
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Blood Donation Camp"
                     title="Blood Donation Camp"
                     class="event-image">
                <p>Blood Donation Camp</p>
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Cultural Festival"
                     title="Cultural Festival"
                     class="event-image">
                <p>Cultural Festival</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Sports Meet"
                     title="Sports Meet"
                     class="event-image">
                <p>Annual Sports Meet</p>
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Community Service"
                     title="Community Service"
                     class="event-image">
                <p>Community Service Program</p>
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Science Exhibition"
                     title="Science Exhibition"
                     class="event-image">
                <p>Science Exhibition</p>
            </td>
        </tr>

    </table>

</body>
</html>
