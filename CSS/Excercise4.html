<!DOCTYPE html>
<html>
<head>
    <title>Color & Background Styling</title>

    <style>
        body {
            background-color: #f0f8ff; /* Fallback color */
            background-image: url("background.jpg");
            background-size: cover;
        }

        h1 {
            color: #003366; /* HEX color */
            background: linear-gradient(to right, #4facfe, #00f2fe);
            padding: 10px;
        }

        p {
            background-color: rgba(0, 128, 255, 0.3); /* RGBA color */
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>Community Event Portal</h1>

    <p>
        Welcome to the city council's community event portal.
    </p>

</body>
</html>
