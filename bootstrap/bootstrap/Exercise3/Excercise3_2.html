<!DOCTYPE html>
<html>
<head>
    <title>Grid Example</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="row">

        <div class="col">
            <div class="bg-warning p-3">
                Column 1
            </div>
        </div>

        <div class="col">
            <div class="bg-info p-3">
                Column 2
            </div>
        </div>

        <div class="col">
            <div class="bg-secondary text-white p-3">
                Column 3
            </div>
        </div>

    </div>

</div>

</body>
</html>
